<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poster Generator</title>

<style>
body {
  margin: 0;
  background: #020617;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Controls */
.controls {
  margin: 20px;
}

button, select {
  padding: 10px 15px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

/* Poster */
.poster {
  width: 280px;
  height: 300px;
  border-radius: 25px;
  padding: 40px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(160deg, #020617, #0f172a);
}

/* Animated border */
.poster::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 25px;
  background: linear-gradient(45deg, #38bdf8, #a855f7, #ec4899, #f59e0b);
  background-size: 300% 300%;
  animation: borderMove 8s linear infinite;
  z-index: 0;
}

.poster::after {
  content: "";
  position: absolute;
  inset: 3px;
  border-radius: 22px;
  background: inherit;
  z-index: 1;
}

@keyframes borderMove {
  0% {background-position:0%}
  100% {background-position:300%}
}

/* Content */
.poster-content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
}

.quote {
  font-size: 26px;
  color: #fff;
  margin-bottom: 30px;
}

.author {
  font-size: 18px;
  font-weight: bold;
  background: linear-gradient(90deg,#38bdf8,#a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* Shapes */
.shape {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
  opacity: 0.5;
}

.s1 { width:200px;height:200px;background:#38bdf8;top:-50px;left:-50px;}
.s2 { width:250px;height:250px;background:#a855f7;bottom:-80px;right:-80px;}
.s3 { width:150px;height:150px;background:#f59e0b;top:50%;left:-60px;}

/* Small particles */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  opacity: 0.3;
  animation: float 10s infinite linear;
}

@keyframes float {
  from { transform: translateY(0); }
  to { transform: translateY(-800px); }
}

/* Template variations */
.template2 {
  background: linear-gradient(135deg, #1e293b, #020617);
}

.template3 {
  background: radial-gradient(circle at top, #0ea5e9, #020617);
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="downloadImage()">📥 Download</button>

  <select onchange="changeTemplate(this.value)">
    <option value="">Default</option>
    <option value="template2">Dark Glass</option>
    <option value="template3">Blue Glow</option>
  </select>
</div>

<div id="poster" class="poster">

  <!-- Shapes -->
  <div class="shape s1"></div>
  <div class="shape s2"></div>
  <div class="shape s3"></div>

  <!-- Particles -->
  <div id="particles"></div>

  <!-- Content -->
  <div class="poster-content">
    <div class="quote" contenteditable="true">
      Click to edit your quote...
    </div>
    <div class="author" contenteditable="true">
      — Noko Coin
    </div>
  </div>

</div>

<!-- html2canvas CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
// Download function
function downloadImage() {
  html2canvas(document.getElementById("poster")).then(canvas => {
    let link = document.createElement("a");
    link.download = "poster.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

// Template switcher
function changeTemplate(template) {
  const poster = document.getElementById("poster");
  poster.className = "poster " + template;
}

// Generate particles
const particleContainer = document.getElementById("particles");

for (let i = 0; i < 30; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * 100 + "%";
  p.style.top = Math.random() * 100 + "%";
  p.style.animationDuration = (5 + Math.random() * 10) + "s";
  particleContainer.appendChild(p);
}
</script>

</body>
</html>

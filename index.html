<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poster Pro Max</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#020617;
}

/* Controls */
.controls {
  margin:10px;
  text-align:center;
}

button, select, input {
  margin:5px;
  padding:8px;
  border-radius:8px;
  border:none;
}

/* Poster */
.poster {
  width:420px;
  height:700px;
  border-radius:25px;
  padding:40px;
  position:relative;
  overflow:hidden;
  background:#020617;
}

/* Background image */
.poster img.bg {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.3;
  top:0;
  left:0;
}

/* Border */
.poster::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:25px;
  background:linear-gradient(45deg,#38bdf8,#a855f7,#ec4899,#f59e0b);
  background-size:300%;
  animation:move 8s linear infinite;
}

.poster::after {
  content:"";
  position:absolute;
  inset:3px;
  border-radius:22px;
  background:inherit;
}

@keyframes move {
  0%{background-position:0%}
  100%{background-position:300%}
}

/* Content */
.poster-content {
  position:relative;
  z-index:2;
  top:50%;
  transform:translateY(-50%);
  text-align:center;
}

.quote {
  font-size:26px;
  color:white;
  margin-bottom:20px;
}

.author {
  font-size:18px;
  font-weight:bold;
}

/* Particles */
.star {
  position:absolute;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  opacity:0.6;
  animation:float 8s linear infinite;
}

@keyframes float {
  from {transform:translateY(0)}
  to {transform:translateY(-800px)}
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="download()">📥 Download</button>
  <button onclick="randomize()">🎲 Random</button>

  <select onchange="resize(this.value)">
    <option value="420x700">Story</option>
    <option value="600x600">Square</option>
    <option value="800x450">Landscape</option>
  </select>

  <select onchange="changeFont(this.value)">
    <option value="Segoe UI">Default</option>
    <option value="serif">Serif</option>
    <option value="monospace">Mono</option>
    <option value="cursive">Cursive</option>
  </select>

  <input type="color" onchange="changeColor(this.value)">
  <input type="file" onchange="uploadBg(event)">
</div>

<div id="poster" class="poster">

  <img class="bg" id="bgImg">

  <div id="stars"></div>

  <div class="poster-content">
    <div class="quote" contenteditable="true">
      Click and write your quote...
    </div>
    <div class="author" contenteditable="true">
      — Noko Coin
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const poster = document.getElementById("poster");

/* Download */
function download(){
  html2canvas(poster,{backgroundColor:null}).then(canvas=>{
    let link=document.createElement("a");
    link.download="poster.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

/* Resize */
function resize(val){
  let [w,h]=val.split("x");
  poster.style.width=w+"px";
  poster.style.height=h+"px";
}

/* Font */
function changeFont(f){
  document.querySelector(".quote").style.fontFamily=f;
}

/* Color */
function changeColor(c){
  document.querySelector(".quote").style.color=c;
}

/* Upload BG */
function uploadBg(e){
  const file=e.target.files[0];
  if(file){
    document.getElementById("bgImg").src=URL.createObjectURL(file);
  }
}

/* Random */
function randomize(){
  changeColor('#'+Math.floor(Math.random()*16777215).toString(16));
  generateStars();
}

/* Stars */
function generateStars(){
  const s=document.getElementById("stars");
  s.innerHTML="";
  for(let i=0;i<50;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";
    star.style.animationDuration=(5+Math.random()*5)+"s";
    s.appendChild(star);
  }
}

generateStars();
</script>

</body>
</html>

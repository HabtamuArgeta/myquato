<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poster Ultimate Final</title>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#020617;
}

/* CONTROLS (2 FULL ROWS) */
.controls {
  width:100%;
  max-width:800px;
}

.row {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
  margin:10px;
}

button, select, input {
  padding:15px;
  font-size:16px;
  border-radius:12px;
  border:none;
  cursor:pointer;
  background:#1e293b;
  color:white;
  width:100%;
}

/* POSTER */
.poster {
  width:420px;
  height:700px;
  border-radius:25px;
  padding:40px;
  position:relative;
  overflow:hidden;
  background:#020617;
}

/* BACKGROUND */
.poster-bg {
  position:absolute;
  inset:0;
  background:linear-gradient(160deg,#020617,#0f172a);
  z-index:0;
}

/* BORDER */
.poster::before {
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:25px;
  background:linear-gradient(45deg,#38bdf8,#a855f7,#ec4899,#f59e0b);
  background-size:300%;
  animation:move 8s linear infinite;
  z-index:1;
}

.poster::after {
  content:"";
  position:absolute;
  inset:3px;
  border-radius:22px;
  background:rgba(2,6,23,0.9);
  z-index:2;
}

@keyframes move {
  0%{background-position:0%}
  100%{background-position:300%}
}

/* CONTENT */
.poster-content {
  position:relative;
  z-index:5;
  top:50%;
  transform:translateY(-50%);
  text-align:center;
}

.quote {
  font-size:28px;
  color:white;
  margin-bottom:20px;
}

.author {
  font-size:20px;
  font-weight:bold;
  color:#38bdf8;
}

/* STARS */
.star {
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  box-shadow:0 0 8px white;
  opacity:0.8;
  animation:float 10s linear infinite;
  z-index:3;
}

/* SHAPES */
.shape {
  position:absolute;
  opacity:0.3;
  z-index:3;
}

.circle {
  width:120px;
  height:120px;
  background:#38bdf8;
  border-radius:50%;
  filter:blur(50px);
}

.square {
  width:100px;
  height:100px;
  background:#a855f7;
  transform:rotate(45deg);
  filter:blur(40px);
}

.triangle {
  width:0;
  height:0;
  border-left:60px solid transparent;
  border-right:60px solid transparent;
  border-bottom:100px solid #f59e0b;
  filter:blur(30px);
}

@keyframes float {
  from {transform:translateY(0)}
  to {transform:translateY(-800px)}
}
</style>
</head>

<body>

<div class="controls">

  <!-- ROW 1 -->
  <div class="row">
    <button onclick="downloadImage()">📥 Image</button>
    <button onclick="recordVideo()">🎞️ Video</button>
    <button onclick="randomize()">🎲 Random</button>
  </div>

  <!-- ROW 2 -->
  <div class="row">
    <select onchange="resize(this.value)">
      <option value="420x700">Story</option>
      <option value="600x600">Square</option>
      <option value="800x450">Landscape</option>
    </select>

    <select onchange="changeFont(this.value)">
      <option value="Segoe UI">Default</option>
      <option value="serif">Serif</option>
      <option value="monospace">Mono</option>
      <option value="cursive">Cursive</option>
    </select>

    <input type="number" id="duration" placeholder="Seconds (e.g. 5)" min="2" max="15">
  </div>

</div>

<div id="poster" class="poster">
  <div class="poster-bg"></div>
  <div id="stars"></div>
  <div id="shapes"></div>

  <div class="poster-content">
    <div class="quote" contenteditable="true">
      Click and write your quote...
    </div>
    <div class="author" contenteditable="true">
      Habtamu Argeta
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
const poster=document.getElementById("poster");

/* IMAGE */
function downloadImage(){
  html2canvas(poster,{backgroundColor:null,scale:2}).then(canvas=>{
    let link=document.createElement("a");
    link.download="poster.png";
    link.href=canvas.toDataURL();
    link.click();
  });
}

/* VIDEO FIXED */
function recordVideo(){
  let duration=parseInt(document.getElementById("duration").value)||5;

  const canvas=document.createElement("canvas");
  canvas.width=poster.offsetWidth;
  canvas.height=poster.offsetHeight;
  const ctx=canvas.getContext("2d");

  const stream=canvas.captureStream(30);
  const recorder=new MediaRecorder(stream);
  let chunks=[];

  recorder.ondataavailable=e=>chunks.push(e.data);
  recorder.onstop=()=>{
    let blob=new Blob(chunks,{type:"video/webm"});
    let link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="poster.webm";
    link.click();
  };

  recorder.start();

  let start=Date.now();

  function draw(){
    html2canvas(poster,{backgroundColor:null}).then(c=>{
      ctx.drawImage(c,0,0,canvas.width,canvas.height);
    });

    if(Date.now()-start<duration*1000){
      requestAnimationFrame(draw);
    }else{
      recorder.stop();
    }
  }

  draw();
}

/* OTHERS */
function resize(v){
  let [w,h]=v.split("x");
  poster.style.width=w+"px";
  poster.style.height=h+"px";
}

function changeFont(f){
  document.querySelector(".quote").style.fontFamily=f;
}

function randomize(){
  generateStars();
  generateShapes();
}

/* STARS */
function generateStars(){
  const s=document.getElementById("stars");
  s.innerHTML="";
  for(let i=0;i<60;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";
    s.appendChild(star);
  }
}

/* SHAPES */
function generateShapes(){
  const s=document.getElementById("shapes");
  s.innerHTML="";
  let types=["circle","square","triangle"];

  for(let i=0;i<10;i++){
    let d=document.createElement("div");
    let t=types[Math.floor(Math.random()*types.length)];
    d.className="shape "+t;
    d.style.top=Math.random()*100+"%";
    d.style.left=Math.random()*100+"%";
    s.appendChild(d);
  }
}

generateStars();
generateShapes();
</script>

</body>
</html>
